name: Pull from private and deploy to Pages

on:
  workflow_dispatch:
  # optional: run on a schedule
  # schedule:
  #   - cron: "0 * * * *"

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout public repo (meta only)
        uses: actions/checkout@v4

      - name: Checkout private source
        uses: actions/checkout@v4
        with:
          repository: <YOUR_USER>/<PRIVATE_REPO>
          token: ${{ secrets.PAT_PRIVATE_REPO }}
          path: private-src
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
          cache-dependency-path: private-src/package-lock.json

      - name: Build site
        working-directory: private-src
        run: |
          npm ci
          npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: private-src/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
